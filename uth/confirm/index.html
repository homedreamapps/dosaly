<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening Dosaly…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px">Opening Dosaly…</p>
  <script>
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.href = 'dosaly://auth/confirm' + search + hash;
    setTimeout(function() {
      document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px">Please open this link on the device where Dosaly is installed.</p>';
    }, 2000);
  </script>
</body>
</html>
